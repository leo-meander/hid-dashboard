name: Cron — Ads Platform sync

# 06:00 ICT (UTC+7) = 23:00 UTC the previous day.
# Pulls daily spend + ad metadata + budget + booking matches from the
# Meander ads aggregator (https://ads-performance-fuls.zeabur.app — backend
# of meander-ad-platform).
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/sync/ads-platform
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SYNC_TRIGGER_TOKEN: ${{ secrets.SYNC_TRIGGER_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            http_code=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "${BACKEND_URL}/api/sync/ads-platform" \
              -H "X-Sync-Token: ${SYNC_TRIGGER_TOKEN}" \
              --max-time 600) || true
            cat response.json
            echo
            if [ "$http_code" = "200" ]; then
              echo "OK"
              exit 0
            fi
            echo "Got HTTP $http_code, retrying in 30s..."
            sleep 30
          done
          echo "Failed after 3 attempts"
          exit 1
