name: Cron — reservation_daily refill (daily 01:00 ICT)

# 01:00 ICT (UTC+7) = 18:00 UTC daily.
# Calls /api/sync/insights WITHOUT insights_only so the endpoint runs the FULL
# pipeline (backfill → accommodation revenue → populate_reservation_daily →
# Cloudbeds Insights occupancy → filtered). The 2x-daily cron-insights.yml runs
# insights_only=true and SKIPS populate_reservation_daily, so without this job
# the reservation_daily table never gets refreshed — and the Weekly Report
# "Channel Mix" section (the only section that reads reservation_daily) silently
# rots while every Insights-based number stays correct.
#
# Runs once daily, well before the Mon 03:00 ICT weekly-report cache rebuild and
# the 09:00/14:00 ICT insights refresh, so reservation_daily is fresh for both.
#
# The endpoint returns immediately and does the work in a background task, so the
# curl just triggers it. Auth: standard HiD cron pattern — X-Sync-Token.
on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/sync/insights (full pipeline, all branches)
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SYNC_TRIGGER_TOKEN: ${{ secrets.SYNC_TRIGGER_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            http_code=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "${BACKEND_URL}/api/sync/insights" \
              -H "X-Sync-Token: ${SYNC_TRIGGER_TOKEN}" \
              --max-time 300) || true
            cat response.json
            echo
            if [ "$http_code" = "200" ]; then
              echo "OK — full sync pipeline running in background"
              exit 0
            fi
            echo "Got HTTP $http_code, retrying in 30s..."
            sleep 30
          done
          echo "Failed after 3 attempts"
          exit 1
