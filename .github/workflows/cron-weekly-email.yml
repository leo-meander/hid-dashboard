name: Cron — Weekly HiD Email Report (Mon 07:00 ICT)

# 07:00 ICT (UTC+7) = 00:00 UTC every Monday.
# Triggers POST /api/report/send-weekly-cron which:
#   - rebuilds the full weekly report (KPI, Paid Ads, KOL, CRM, country intel,
#     ad-budget optimizer, next actions) from Supabase
#   - renders the HTML email
#   - sends to recipients listed in env EMAIL_RECIPIENTS on Zeabur
#
# Auth: standard HiD cron pattern — `X-Sync-Token: $SYNC_TRIGGER_TOKEN`.
# Set SYNC_TRIGGER_TOKEN and BACKEND_URL as repo secrets in GitHub.
# Server-side env: GMAIL_USER, GMAIL_APP_PASSWORD, EMAIL_RECIPIENTS must be
# configured on Zeabur (see deployment-rules).
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/report/send-weekly-cron
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SYNC_TRIGGER_TOKEN: ${{ secrets.SYNC_TRIGGER_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            http_code=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "${BACKEND_URL}/api/report/send-weekly-cron" \
              -H "X-Sync-Token: ${SYNC_TRIGGER_TOKEN}" \
              --max-time 600) || true
            cat response.json
            echo
            if [ "$http_code" = "200" ]; then
              echo "OK — weekly email dispatched"
              exit 0
            fi
            echo "Got HTTP $http_code, retrying in 30s..."
            sleep 30
          done
          echo "Failed after 3 attempts"
          exit 1
