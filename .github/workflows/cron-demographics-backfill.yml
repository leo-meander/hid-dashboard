name: Cron — Guest demographics backfill (resume until done)

# One-off, self-resuming backfill of reservations.gender / date_of_birth from
# Cloudbeds /getReservation detail. The job is a multi-hour serial crawl (~80
# rows/min, Cloudbeds rate limit), and FastAPI BackgroundTasks die when Zeabur
# recycles the container — so this fires every 30 min and re-triggers the
# backfill, which is idempotent (only touches rows where gender IS NULL).
#
# ?limit=2000 caps each invocation to a bounded chunk (~25 min of work, shared
# across branches) so runs finish within the interval and don't pile up while
# the container is healthy. When coverage hits 0 pending, each run becomes a
# fast no-op — DELETE this workflow once the backfill is complete.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/sync/backfill-demographics?limit=2000
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SYNC_TRIGGER_TOKEN: ${{ secrets.SYNC_TRIGGER_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            http_code=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "${BACKEND_URL}/api/sync/backfill-demographics?limit=2000" \
              -H "X-Sync-Token: ${SYNC_TRIGGER_TOKEN}" \
              --max-time 120) || true
            cat response.json
            echo
            if [ "$http_code" = "200" ]; then
              echo "OK — endpoint accepted, backfill chunk running in background"
              exit 0
            fi
            echo "Got HTTP $http_code, retrying in 30s..."
            sleep 30
          done
          echo "Failed after 3 attempts"
          exit 1
