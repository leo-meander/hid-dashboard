name: Cron — Daily alert evaluation

# 03:15 ICT (UTC+7) = 20:15 UTC the previous day.
# Runs alert_engine.run_daily_alerts to generate alerts for yesterday.
on:
  schedule:
    - cron: "15 20 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/alerts/evaluate-now
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SYNC_TRIGGER_TOKEN: ${{ secrets.SYNC_TRIGGER_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            http_code=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "${BACKEND_URL}/api/alerts/evaluate-now" \
              -H "X-Sync-Token: ${SYNC_TRIGGER_TOKEN}" \
              --max-time 300) || true
            cat response.json
            echo
            if [ "$http_code" = "200" ]; then
              echo "OK"
              exit 0
            fi
            echo "Got HTTP $http_code, retrying in 30s..."
            sleep 30
          done
          echo "Failed after 3 attempts"
          exit 1
