name: Cron — Marketing budget actuals sync

# 06:30 ICT (UTC+7) = 23:30 UTC the previous day.
# Runs after the Ads Platform sync so paid_ads actuals are already current.
# Refreshes marketing_budgets.cached_actual_vnd for every active branch.
on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/sync/marketing-budget-actuals
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SYNC_TRIGGER_TOKEN: ${{ secrets.SYNC_TRIGGER_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            http_code=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "${BACKEND_URL}/api/sync/marketing-budget-actuals" \
              -H "X-Sync-Token: ${SYNC_TRIGGER_TOKEN}" \
              --max-time 300) || true
            cat response.json
            echo
            if [ "$http_code" = "200" ]; then
              echo "OK"
              exit 0
            fi
            echo "Got HTTP $http_code, retrying in 30s..."
            sleep 30
          done
          echo "Failed after 3 attempts"
          exit 1
